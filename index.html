---
layout: home
---

<div class="home">
  <h1>Welcome to My AI Development Blog</h1>
  <p>Tutorials, projects, and insights about building AI systems.</p>
  
  <h2>Latest Posts</h2>
  <ul class="post-list">
    {% for post in site.posts limit:5 %}
      <li>
        <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>
        <h3>
          <a class="post-link" href="{{ post.url | relative_url }}">
            {{ post.title | escape }}
          </a>
        </h3>
        <p>{{ post.description }}</p>
      </li>
    {% endfor %}
  </ul>
</div>
